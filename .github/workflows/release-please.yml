# Opens / maintains the @nebula-ai/mcp-server release PR. Merging the release PR
# creates a tagged GitHub Release; that release event triggers publish-npm.yml.

name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release-as:
        description: "Pin the next release to this exact version. Leave blank for the default RC bump."
        required: false
        type: string

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.NEBULA_SDK_BOT_APP_ID }}
          private-key: ${{ secrets.NEBULA_SDK_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.release-as }}
